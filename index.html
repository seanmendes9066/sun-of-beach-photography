<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高階攝影作品集 - Premium Photography Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body id="top">

    <header>
        <h1>Lens & Light</h1>
        <nav>
            <button class="filter-btn active" data-filter="all">All Works</button>
            <button class="filter-btn" data-filter="people">People</button>
            <button class="filter-btn" data-filter="things">Things</button>
            <button class="filter-btn" data-filter="place">Place</button>
        </nav>
    </header>

    <main>
        <div class="gallery-grid" id="gallery">
            
            <div class="gallery-item place">
                <img src="https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?q=80&w=1200&auto=format&fit=crop" alt="Yosemite Valley Landscape">
                <div class="item-overlay">
                    <h3>Yosemite</h3>
                    <p>Place / Nature</p>
                </div>
            </div>
            
            <div class="gallery-item people">
                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=1200&auto=format&fit=crop" alt="Fashion Portrait of a Woman">
                <div class="item-overlay">
                    <h3>Gaze</h3>
                    <p>People / Editorial</p>
                </div>
            </div>

            <div class="gallery-item things">
                <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=1200&auto=format&fit=crop" alt="Minimalist Headphones">
                <div class="item-overlay">
                    <h3>Acoustic</h3>
                    <p>Things / Product</p>
                </div>
            </div>

            <div class="gallery-item place">
                <img src="https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?q=80&w=1200&auto=format&fit=crop" alt="Serene Lake View">
                <div class="item-overlay">
                    <h3>Tranquility</h3>
                    <p>Place / Landscape</p>
                </div>
            </div>

            <div class="gallery-item people">
                <img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?q=80&w=1200&auto=format&fit=crop" alt="Black and White Studio Portrait">
                <div class="item-overlay">
                    <h3>Shadows</h3>
                    <p>People / Studio</p>
                </div>
            </div>

            <div class="gallery-item things">
                <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=1200&auto=format&fit=crop" alt="Luxury Wristwatch">
                <div class="item-overlay">
                    <h3>Timepiece</h3>
                    <p>Things / Still Life</p>
                </div>
            </div>
            
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
