<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的攝影空間 | Photography Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <div class="logo">PHOTO BY ME</div>
        <ul>
            <li><a href="#gallery">作品集</a></li>
            <li><a href="#about">關於我</a></li>
        </ul>
    </nav>

    <header>
        <h1>捕捉光影的瞬間</h1>
        <p>歡迎來到我的視覺世界</p>
    </header>

    <main id="gallery">
        <div class="grid">
            <div class="photo-card"><img src="https://picsum.photos/600/800?random=1" alt="作品 1"></div>
            <div class="photo-card"><img src="https://picsum.photos/600/400?random=2" alt="作品 2"></div>
            <div class="photo-card"><img src="https://picsum.photos/600/700?random=3" alt="作品 3"></div>
            <div class="photo-card"><img src="https://picsum.photos/600/600?random=4" alt="作品 4"></div>
            <div class="photo-card"><img src="https://picsum.photos/600/900?random=5" alt="作品 5"></div>
            <div class="photo-card"><img src="https://picsum.photos/600/500?random=6" alt="作品 6"></div>
        </div>
    </main>

    <section id="about">
        <h2>關於我</h2>
        <p>紀錄生活，分享視角。我是一名熱愛街拍與人像的攝影愛好者。</p>
    </section>

    <footer>
        <p>&copy; 2026 My Photography. Built with GitHub Pages.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
